<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-r from-blue-50 to-purple-50">
    <div class="bg-white p-12 rounded-2xl shadow-2xl text-center">
        <h1 class="text-3xl font-semibold text-gray-700 mb-6">Counter App</h1>

        <label id="countlabel" class="text-8xl font-bold mb-8 block text-black">0</label>

        <div class="flex gap-4 flex-wrap justify-center">
            <button id="decreaseBtn"
                class="px-8 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 hover:scale-105 transition-all duration-300 font-semibold shadow-lg">
                Decrease
            </button>
            <button id="resetBtn"
                class="px-8 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 hover:scale-105 transition-all duration-300 font-semibold shadow-lg">
                Reset
            </button>
            <button id="increaseBtn"
                class="px-8 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 hover:scale-105 transition-all duration-300 font-semibold shadow-lg">
                Increase
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
